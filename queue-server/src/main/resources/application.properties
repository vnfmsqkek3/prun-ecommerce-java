spring.application.name=queue-server
server.port=8081

# 리버스 프록시 대상 — 내부 ALB2 뒤의 API 백엔드. /api/queue/* 외 /api/** 를 여기로 포워딩.
backend.url=${BACKEND_URL:http://localhost:8080}

# 기본: 인메모리 대기열 (외부 의존 없음). 스케일아웃 시 'redis' 프로파일로 전환:
#   ./gradlew bootRun --args='--spring.profiles.active=redis'  (REDIS_HOST 지정)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
management.health.redis.enabled=false

# 대기열 정책. 정상 흐름은 complete(예약완료) 시 즉시 다음 대기자 승격.
# scheduler 는 TTL 만료(이탈 슬롯 회수) 반영용 폴백이라 짧게. active-ttl 은 이탈 슬롯 타임아웃.
queue.capacity=${QUEUE_CAPACITY:3}
queue.active-ttl-seconds=${QUEUE_ACTIVE_TTL:600}
queue.scheduler-ms=${QUEUE_SCHEDULER_MS:2000}

management.endpoints.web.exposure.include=health
