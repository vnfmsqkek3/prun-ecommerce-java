spring.application.name=queue-server
server.port=8081

# 기본: 인메모리 대기열 (외부 의존 없음). 스케일아웃 시 'redis' 프로파일로 전환:
#   ./gradlew bootRun --args='--spring.profiles.active=redis'  (REDIS_HOST 지정)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
management.health.redis.enabled=false

# 대기열 정책 (데모 기본값 — 운영은 capacity/admit-batch 를 크게)
queue.capacity=${QUEUE_CAPACITY:3}
queue.admit-batch=${QUEUE_ADMIT_BATCH:1}
queue.active-ttl-seconds=${QUEUE_ACTIVE_TTL:600}
queue.scheduler-ms=${QUEUE_SCHEDULER_MS:10000}

management.endpoints.web.exposure.include=health
