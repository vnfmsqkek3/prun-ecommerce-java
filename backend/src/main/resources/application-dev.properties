# Development Environment - MySQL

# Redis session is prod-only. Lettuce connects lazily, so dev never touches Redis;
# just silence the Redis health indicator (no dev Redis running).
management.health.redis.enabled=false

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_dev?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=dev_user
spring.datasource.password=dev_password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
