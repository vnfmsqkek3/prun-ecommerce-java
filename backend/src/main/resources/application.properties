spring.application.name=concert-ticketing
server.port=8080

# MySQL (docker-compose / RDS). 순수 로컬은 'local' 프로파일(H2) 사용.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ticketing}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rootpw}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# 별도 대기열 서버
queue-server.url=${QUEUE_SERVER_URL:http://localhost:8081}

# 카카오 알림톡 (미설정 시 콘솔 로그. 운영은 제공사 REST API 주입)
app.kakao.api-url=${KAKAO_API_URL:}
app.kakao.api-key=${KAKAO_API_KEY:}
app.kakao.sender-key=${KAKAO_SENDER_KEY:}
app.kakao.template-code=${KAKAO_TEMPLATE_CODE:}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
logging.level.com.example.ticketing=INFO
