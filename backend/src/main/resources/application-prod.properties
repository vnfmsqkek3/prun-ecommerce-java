# Production Environment - Amazon RDS MySQL

# MySQL Database (RDS)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecommerce_prod}?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:prod_user}
spring.datasource.password=${DB_PASSWORD:prod_password}

# JPA
# update: 빈 RDS 에 엔티티 기준 테이블 자동 생성 (첫 배포가 그냥 뜨도록).
# 스키마 거버넌스가 필요하면 Flyway/Liquibase 도입 후 validate 로 회귀 권장.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Redis / ElastiCache - shared HTTP session store across autoscaled instances
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.session.timeout=30m
server.servlet.session.timeout=30m

# Logging (Production - Less verbose)
logging.level.org.hibernate.SQL=INFO
logging.level.com.example.ecommercedemo=INFO
