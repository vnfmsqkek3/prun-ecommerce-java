version: 0.2

# CodeBuild 는 phase 간 작업 디렉토리(cd)가 유지됨 → 모든 명령을 build phase 에서 실행.
# jar 빌드 후 번들(app.jar + appspec.yml + scripts/)을 CodeDeploy 로 전달.
# artifacts base-directory 는 소스 루트 기준이므로 backend 로 지정.
phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - cd backend
      - chmod +x gradlew
      - if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then gradle wrapper; fi
      - ./gradlew bootJar -x test
      - cp build/libs/*.jar app.jar
      - chmod +x scripts/*.sh

artifacts:
  base-directory: backend
  files:
    - app.jar
    - appspec.yml
    - scripts/**/*
