version: 0.0
os: linux
# 번들 루트(= buildspec base-directory: backend)에 app.jar / appspec.yml / scripts/ 존재
files:
  - source: app.jar
    destination: /opt/furn
hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 180
      runas: root
