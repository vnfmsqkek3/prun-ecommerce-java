version: 0.0
os: linux
# 번들 루트(= buildspec base-directory: frontend)에 dist/ / appspec.yml / scripts/ 존재
files:
  - source: dist/
    destination: /usr/share/nginx/html
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: root
